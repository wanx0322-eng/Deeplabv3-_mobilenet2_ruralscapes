name: Front-end quality

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  windows-ui:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Front-end architecture lint
        run: |
          python tools/ui_lint.py
          python tools/qml_lint.py
          python tools/i18n_scan.py
      - name: Generated artifact drift
        shell: pwsh
        run: |
          python tools/generate_design_tokens.py
          python tools/update_translations.py
          python tools/capture_ui_baselines.py
          git diff --exit-code -- docs/design_tokens.md workstation/i18n tests/ui_baseline
      - name: Full regression suite
        shell: pwsh
        run: ./tools/run_ui_tests.ps1 -Python python -Tests tests
